<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דניאל | אורן כהן גרופ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      height: 100vh; display: flex; flex-direction: column;
      background: #e5ddd5;
    }
    /* Header */
    .header {
      background: #075e54; color: #fff; padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%; background: #25d366;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px; color: #fff;
    }
    .header-info h1 { font-size: 16px; font-weight: 600; }
    .header-info span { font-size: 12px; opacity: 0.8; }

    /* Chat area */
    #chat {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 4px;
      background: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='p' width='40' height='40' patternUnits='userSpaceOnUse'%3E%3Cpath d='M0 20h40M20 0v40' stroke='%23d4cfc6' stroke-width='0.5' fill='none'/%3E%3C/pattern%3E%3C/defs%3E%3Crect width='200' height='200' fill='%23e5ddd5'/%3E%3Crect width='200' height='200' fill='url(%23p)' opacity='0.3'/%3E%3C/svg%3E");
    }
    .msg {
      max-width: 75%; padding: 8px 12px; border-radius: 8px;
      font-size: 14px; line-height: 1.5; position: relative;
      word-wrap: break-word; white-space: pre-wrap;
      box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }
    .msg.in {
      align-self: flex-start; background: #fff;
      border-top-right-radius: 0;
    }
    .msg.out {
      align-self: flex-end; background: #dcf8c6;
      border-top-left-radius: 0;
    }
    .msg .time {
      font-size: 11px; color: #999; margin-top: 4px;
      text-align: left; direction: ltr;
    }

    /* Input bar */
    .input-bar {
      background: #f0f0f0; padding: 8px 12px;
      display: flex; align-items: center; gap: 8px;
    }
    #input {
      flex: 1; border: none; background: #fff; border-radius: 20px;
      padding: 10px 16px; font-size: 15px; font-family: inherit;
      outline: none;
    }
    #send {
      width: 42px; height: 42px; border: none; border-radius: 50%;
      background: #075e54; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #send svg { fill: #fff; width: 20px; height: 20px; }
    #send:disabled { opacity: 0.5; cursor: default; }

    /* Typing indicator */
    .typing { align-self: flex-start; padding: 10px 16px; background: #fff; border-radius: 8px; border-top-right-radius: 0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
    .typing span { display: inline-block; width: 8px; height: 8px; background: #90949c; border-radius: 50%; animation: bounce 1.4s infinite; margin: 0 2px; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }
  </style>
</head>
<body>
  <div class="header">
    <div class="avatar">ד</div>
    <div class="header-info">
      <h1>דניאל</h1>
      <span>מקוון</span>
    </div>
  </div>

  <div id="chat"></div>

  <div class="input-bar">
    <input id="input" placeholder="הקלידו הודעה..." autocomplete="off" />
    <button id="send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    let sessionId = null;

    function getTime() {
      return new Date().toLocaleTimeString("he-IL", { hour: "2-digit", minute: "2-digit" });
    }

    function addMsg(text, type) {
      const d = document.createElement("div");
      d.className = "msg " + type;
      d.innerHTML = text + '<div class="time">' + getTime() + '</div>';
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      const d = document.createElement("div");
      d.className = "typing";
      d.id = "typing";
      d.innerHTML = "<span></span><span></span><span></span>";
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      addMsg(text, "out");
      input.value = "";
      sendBtn.disabled = true;
      showTyping();
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, message: text }),
        });
        const data = await res.json();
        sessionId = data.session_id;
        hideTyping();
        addMsg(data.reply, "in");
      } catch (e) {
        hideTyping();
        addMsg("לא הצלחתי להתחבר, נסו שוב", "in");
      }
      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.onclick = send;
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

    // No greeting on load - wait for user to initiate
  </script>
</body>
</html>
