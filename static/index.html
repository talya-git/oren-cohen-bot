<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>אורן כהן גרופ — דניאל</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f1ea; color: #2a2a2a; height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }
    header {
      width: 100%; background: #1c2b3a; color: #f4f1ea;
      padding: 16px 24px; text-align: center;
    }
    header h1 { margin: 0; font-size: 20px; font-weight: 600; letter-spacing: .5px; }
    header span { font-size: 13px; opacity: .8; }
    #chat {
      flex: 1; width: 100%; max-width: 720px; overflow-y: auto;
      padding: 20px; display: flex; flex-direction: column; gap: 12px;
    }
    .msg { max-width: 78%; padding: 11px 15px; border-radius: 16px; line-height: 1.5; white-space: pre-wrap; }
    .bot  { align-self: flex-start; background: #fff; border: 1px solid #e3ddcf; border-bottom-right-radius: 4px; }
    .user { align-self: flex-end; background: #1c2b3a; color: #fff; border-bottom-left-radius: 4px; }
    .meta { align-self: flex-start; font-size: 12px; color: #777; margin: -6px 4px 0; }
    .badge { display: inline-block; padding: 1px 9px; border-radius: 10px; color: #fff; font-weight: 600; }
    .High { background: #2e7d32; } .Medium { background: #ef8c00; } .Low { background: #c62828; }
    .handoff { color: #c62828; font-weight: 600; }
    #bar { width: 100%; max-width: 720px; display: flex; gap: 8px; padding: 14px 20px; border-top: 1px solid #e3ddcf; background: #faf8f2; }
    #input { flex: 1; padding: 12px 14px; border: 1px solid #cfc8b8; border-radius: 22px; font-size: 15px; font-family: inherit; }
    #send { padding: 0 22px; border: none; background: #b5651d; color: #fff; border-radius: 22px; font-size: 15px; cursor: pointer; }
    #send:disabled { opacity: .5; cursor: default; }
  </style>
</head>
<body>
  <header>
    <h1>אורן כהן גרופ</h1>
    <span>דניאל · ייעוץ נדל"ן יוקרה בירושלים</span>
  </header>
  <div id="chat"></div>
  <div id="bar">
    <input id="input" placeholder="כתבו הודעה לדניאל..." autocomplete="off" />
    <button id="send">שליחה</button>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    let sessionId = null;

    function addMsg(text, cls) {
      const d = document.createElement("div");
      d.className = "msg " + cls;
      d.textContent = text;
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
    }

    function addMeta(level, score, handoff) {
      const m = document.createElement("div");
      m.className = "meta";
      m.innerHTML = `דירוג: <span class="badge ${level}">${level}</span> (${score})` +
        (handoff ? ' · <span class="handoff">מועבר לסוכן אנושי</span>' : '');
      chat.appendChild(m);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      addMsg(text, "user");
      input.value = "";
      sendBtn.disabled = true;
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, message: text }),
        });
        const data = await res.json();
        sessionId = data.session_id;
        addMsg(data.reply, "bot");
        addMeta(data.level, data.score, data.handoff_to_human);
      } catch (e) {
        addMsg("שגיאה בחיבור לשרת. ודאי שהשרת רץ ושמוגדר מפתח ANTHROPIC_API_KEY.", "bot");
      }
      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.onclick = send;
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

    // ברכת פתיחה
    fetch("/greeting").then(r => r.json()).then(d => addMsg(d.reply, "bot"));
  </script>
</body>
</html>
