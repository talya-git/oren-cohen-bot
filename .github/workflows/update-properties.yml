name: Update Properties from Sehel

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright openpyxl
          playwright install chromium
          playwright install-deps

      - name: Run scraper
        run: python scraper/scrape_sehel.py

      - name: Push updated data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/properties.json
          git diff --staged --quiet || git commit -m "Auto-update properties from Sehel"
          git pull origin main --rebase
          git push origin main

      - name: Notify if session expired
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          subject: "⚠️ Sehel Bot - Session פג תוקף"
          body: "ה-session של שכל פג תוקף. צריך להריץ מהבית: python scraper/save_state.py"
          to: tsalyato@orencohengroup.com
          from: ${{ secrets.NOTIFY_EMAIL }}
