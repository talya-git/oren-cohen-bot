name: Update Properties from Sehel

on:
  schedule:
    - cron: '*/30 * * * *'  # כל 30 דקות
  workflow_dispatch:  # אפשר להריץ ידנית מ-GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright openpyxl
          playwright install chromium
          playwright install-deps

      - name: Run scraper
        run: python scraper/scrape_sehel.py
        env:
          SEHEL_USER: ${{ secrets.SEHEL_USER }}
          SEHEL_PASS: ${{ secrets.SEHEL_PASS }}

      - name: Push updated data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/properties.json
          git diff --staged --quiet || git commit -m "Auto-update properties from Sehel"
          git push
